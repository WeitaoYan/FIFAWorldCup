<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
    position: relative;
  }
  .bg-pattern {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 80%, rgba(37,99,235,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(251,191,36,0.1) 0%, transparent 50%);
  }
  .card {
    position: relative; z-index: 1;
    text-align: center;
  }
  .year {
    font-size: 120px; font-weight: 900;
    background: linear-gradient(180deg, #fbbf24 0%, #f59e0b 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 8px;
    line-height: 1;
  }
  .title {
    font-size: 36px; font-weight: 700; color: #ffffff;
    margin-top: 16px; letter-spacing: 4px;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 22px; color: rgba(255,255,255,0.6);
    margin-top: 12px; letter-spacing: 2px;
  }
  .trophy {
    margin-top: 24px;
    width: 80px; height: 80px;
    background: radial-gradient(circle, #2563eb 0%, #1d4ed8 100%);
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 0 40px rgba(37,99,235,0.4);
  }
  .trophy svg { width: 48px; height: 48px; }
  .footer {
    position: absolute; bottom: 32px; left: 0; right: 0;
    text-align: center;
    font-size: 16px; color: rgba(255,255,255,0.35);
    letter-spacing: 3px;
  }
</style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="card">
    <div class="year">2026</div>
    <div class="title">FIFA World Cup</div>
    <div class="subtitle">Fan Hub · Predictions · Standings · Chat</div>
    <div class="trophy">
      <svg viewBox="0 0 100 100" fill="none"><path d="M44 68l4 4 8-8" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="50" cy="68" r="20" fill="none" stroke="white" stroke-width="3"/></svg>
    </div>
  </div>
  <div class="footer">2026.IKBER.CC</div>
</body>
</html>
